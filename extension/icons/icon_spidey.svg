<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <rect width="16" height="16" rx="3" fill="#1a1a2e"/>
  <!-- Radial lines -->
  <g stroke="#00d4ff" stroke-width="0.5">
    <line x1="8" y1="8" x2="8" y2="2"/>
    <line x1="8" y1="8" x2="14" y2="2"/>
    <line x1="8" y1="8" x2="14" y2="8"/>
    <line x1="8" y1="8" x2="14" y2="14"/>
    <line x1="8" y1="8" x2="8" y2="14"/>
    <line x1="8" y1="8" x2="2" y2="14"/>
    <line x1="8" y1="8" x2="2" y2="8"/>
    <line x1="8" y1="8" x2="2" y2="2"/>
  </g>
  <!-- Concentric web rings -->
  <g stroke="#00d4ff" stroke-width="0.5" fill="none">
    <circle cx="8" cy="8" r="2"/>
    <circle cx="8" cy="8" r="4"/>
    <circle cx="8" cy="8" r="6"/>
  </g>
</svg>
