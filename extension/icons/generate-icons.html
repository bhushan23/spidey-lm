<!DOCTYPE html>
<html>
<head>
  <title>Generate Extension Icons</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    canvas { border: 1px solid #ccc; margin: 10px; }
    a { display: block; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>Extension Icon Generator</h1>
  <p>Right-click each icon and "Save image as..." with the filename shown:</p>

  <div id="icons"></div>

  <script>
    const sizes = [16, 48, 128];

    function drawIcon(ctx, size) {
      // Background
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, size * 0.2);
      ctx.fill();

      // Face circle
      ctx.fillStyle = '#00d4ff';
      ctx.beginPath();
      ctx.arc(size/2, size/2, size * 0.35, 0, Math.PI * 2);
      ctx.fill();

      // Eyes
      ctx.fillStyle = '#1a1a2e';
      const eyeSize = size * 0.08;
      ctx.beginPath();
      ctx.arc(size * 0.4, size * 0.45, eyeSize, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(size * 0.6, size * 0.45, eyeSize, 0, Math.PI * 2);
      ctx.fill();

      // Smile
      ctx.strokeStyle = '#1a1a2e';
      ctx.lineWidth = size * 0.05;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.arc(size/2, size * 0.5, size * 0.15, 0.2 * Math.PI, 0.8 * Math.PI);
      ctx.stroke();
    }

    const container = document.getElementById('icons');

    sizes.forEach(size => {
      const div = document.createElement('div');
      div.innerHTML = `<h3>icon${size}.png</h3>`;

      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      canvas.style.width = Math.max(size, 64) + 'px';
      canvas.style.height = Math.max(size, 64) + 'px';

      const ctx = canvas.getContext('2d');
      drawIcon(ctx, size);

      div.appendChild(canvas);
      container.appendChild(div);
    });
  </script>
</body>
</html>
