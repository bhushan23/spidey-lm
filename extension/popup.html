<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spidey LM</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="theme-selector">
        <button class="theme-btn" id="theme-btn" title="Change theme">&#9681;</button>
        <div class="theme-menu" id="theme-menu">
          <div class="theme-option" data-theme="default">
            <span class="theme-dot default"></span> Default
          </div>
          <div class="theme-option" data-theme="spidey-classic">
            <span class="theme-dot spidey-classic"></span> Classic Spidey
          </div>
          <div class="theme-option" data-theme="symbiote">
            <span class="theme-dot symbiote"></span> Symbiote
          </div>
          <div class="theme-option" data-theme="miles">
            <span class="theme-dot miles"></span> Miles Morales
          </div>
          <div class="theme-option" data-theme="gwen">
            <span class="theme-dot gwen"></span> Spider-Gwen
          </div>
        </div>
      </div>
      <a href="https://github.com/bhushan23/spidey-lm?tab=readme-ov-file#troubleshooting" target="_blank" class="help-link" title="Help / FAQ">?</a>
      <h1>Spidey LM</h1>
      <div class="model-selector">
        <label for="model-select">Ollama Model:</label>
        <select id="model-select" disabled>
          <option value="">Loading...</option>
        </select>
        <div id="no-models-msg" class="no-models-msg" style="display: none;">
          <span>No models found - run: ollama pull llama3.2 or download models via Ollama app</span>
        </div>
        <span id="status" class="status-indicator"></span>
      </div>
    </header>

    <div class="context-section" id="context-section">
      <span class="context-label">Tab:</span>
      <span id="context-info" class="context-info"></span>
      <button id="refresh-btn" class="refresh-btn" title="Capture current page">&#8635;</button>
    </div>

    <div class="actions" id="actions">
      <button id="summarize-btn" class="btn-action" disabled>
        📝 Summarize
      </button>
      <button id="keypoints-btn" class="btn-action" disabled>
        🔑 Key Points
      </button>
      <button id="explain-btn" class="btn-action" disabled>
        💡 Simplify
      </button>
    </div>

    <div class="chat-container" id="chat"></div>

    <div class="input-section">
      <textarea
        id="input"
        placeholder="Ask about this page..."
        rows="2"
        disabled
      ></textarea>
      <button id="send-btn" disabled>➤</button>
    </div>

    <div class="footer">
      <button id="clear-btn" class="btn-link">Clear Chat</button>
      <span class="separator">|</span>
      <button id="clear-context-btn" class="btn-link">Clear Context</button>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
